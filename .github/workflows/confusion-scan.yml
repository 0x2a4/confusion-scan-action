name: Confusion Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: confusion-scan/confusion-scan-action@v1
        with:
          directory: .
          # ignore: generated,migrations
